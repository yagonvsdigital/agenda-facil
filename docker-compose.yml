version: '3.9'

services:
  # ─── Banco de dados ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: corteja_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: corteja_db
      POSTGRES_USER: corteja
      POSTGRES_PASSWORD: corteja_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U corteja -d corteja_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (NestJS) ─────────────────────────────────────────
  api:
    build:
      context: ./corteja-api
      dockerfile: Dockerfile
    container_name: corteja_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: corteja
      DB_PASS: corteja_pass
      DB_NAME: corteja_db
      JWT_SECRET: ${JWT_SECRET:-troque_em_producao_use_string_longa_aleatoria}
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/v1/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend (React + nginx) ─────────────────────────────────
  web:
    build:
      context: ./corteja
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api/v1}
    container_name: corteja_web
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - api

volumes:
  postgres_data:
